services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wbms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-wbms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Bound to localhost only — reachable via an SSH tunnel, never the public net.
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wbms} -d ${POSTGRES_DB:-wbms}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - db-data:/app/data
      - firmware-artifacts:/app/firmware_artifacts
    environment:
      WBMS_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wbms}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wbms}
      WBMS_SECRET_KEY: ${WBMS_SECRET_KEY:-change-me}
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC:-bms/data}
      MQTT_USERNAME: ${MQTT_USERNAME:-wbms-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      CONNECTED_CELLS: ${CONNECTED_CELLS:-3}
      PARALLEL_COUNT: ${PARALLEL_COUNT:-1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      OTA_URL_SECRET: ${OTA_URL_SECRET:-change-me-in-production-please}
      FIRMWARE_DIR: /app/firmware_artifacts
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy

  ekf-worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.ekf.worker"]
    environment:
      WBMS_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wbms}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-wbms}
      WBMS_LOG_LEVEL: ${WBMS_LOG_LEVEL:-INFO}
      EKF_POLL_INTERVAL_S: ${EKF_POLL_INTERVAL_S:-5}
      EKF_NN_ENABLED: ${EKF_NN_ENABLED:-false}
      EKF_CURRENT_OFFSET_A: ${EKF_CURRENT_OFFSET_A:-0.048}
      EKF_CURRENT_GAIN: ${EKF_CURRENT_GAIN:-1.030}
      EKF_CURRENT_DEADBAND_A: ${EKF_CURRENT_DEADBAND_A:-0.010}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${PUBLIC_URL:-http://localhost:8080}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  db-data:
  firmware-artifacts:
  postgres-data:
  mosquitto-data:
  mosquitto-log:
