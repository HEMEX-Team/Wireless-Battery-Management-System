server {
    listen 80;

    # Docker's embedded DNS — re-resolve service names so a backend container
    # restart (new IP) doesn't leave nginx proxying a stale address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # Firmware uploads land at /v1/firmware and are ~1-1.5 MB binaries.
    # Default 1M would 413 every upload.
    client_max_body_size 16M;

    # --- Compression -----------------------------------------------------
    # The SPA bundle is large (Plotly + Recharts). Gzip cuts JS/CSS by ~70%,
    # which is the single biggest win for first-load time. Assets are
    # pre-minified, so gzip_comp_level 5 is a good size/CPU trade-off.
    gzip on;
    gzip_vary on;                 # emit Vary: Accept-Encoding for caches/CDNs
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;

    # Proxy API calls to the backend container
    location /v1/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://$backend_upstream;
    }

    location /docs {
        proxy_pass http://$backend_upstream;
    }

    location /openapi.json {
        proxy_pass http://$backend_upstream;
    }

    # --- Static asset caching --------------------------------------------
    # Vite emits content-hashed filenames (app.<hash>.js), so the bytes behind
    # a given URL never change — cache them forever. A new deploy ships new
    # hashes, so this can't serve stale code.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # index.html is the un-hashed entrypoint that points at the hashed assets,
    # so it must NEVER be cached — otherwise a browser keeps requesting old
    # asset hashes after a deploy. Always revalidate.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
